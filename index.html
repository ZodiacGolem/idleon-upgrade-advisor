<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IdleOn Upgrade Advisor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>IdleOn Upgrade Advisor</h1>
      <p class="subtitle">
        Cleaner upgrade recommendations with stamps, bubbles, and library tracking.
      </p>
    </header>

    <main class="layout">
      <aside class="panel">
        <input id="profileInput" placeholder="Profile slug or URL">
        <textarea id="jsonInput" placeholder="Or paste JSON"></textarea>

        <div class="button-row">
          <button id="analyzeBtn">Analyze</button>
          <button id="demoBtn">Demo</button>
          <button id="clearBtn">Clear</button>
        </div>

        <div id="status">Ready</div>
      </aside>

      <section id="results" class="hidden">
        <div class="kpi-grid">
          <div>Books: <strong id="kpiBooks">?</strong></div>
          <div>Total: <strong id="kpiTotal">0</strong></div>
          <div>Easy: <strong id="kpiEasy">0</strong></div>
        </div>

        <h2>Library</h2>
        <div id="library"></div>

        <h2>Recommendations</h2>
        <div id="recommendations"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
